name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      MOCK_LLM: "1" # CI runs fully offline with the deterministic mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests (scoring, confidence, retrieval, judge scenarios)
        run: npm test
      - name: Production build
        run: npm run build
